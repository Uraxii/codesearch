# Detect sensitive values passed as GET request parameters.
#
# GET parameters appear in the URL, which means they are:
#   - Stored in server access logs
#   - Stored in browser history
#   - Leaked in Referer headers to third-party sites
#   - Visible in proxy and CDN logs
#
# This filter finds C# action methods decorated with [HttpGet] (or
# [HttpGet("route")]) whose parameter list contains names that suggest
# sensitive data.  It uses a raw tree-sitter AST query so it can check
# BOTH the attribute and the parameters in a single structural match,
# avoiding false positives from POST/PUT/DELETE methods that accept the
# same parameter names legitimately.
#
# Usage:
#   uv run codesearch --filter-file demo/secrets-in-get.ini <path>
#
# To scan the GDVCSharp demo app:
#   uv run codesearch --filter-file demo/secrets-in-get.ini gdvcsharp/app/

[secrets-in-get-request]
type        = ast
lang        = c_sharp
# Only output the sensitive parameter capture, not the HttpGet attribute capture.
captures    = _param
description = GET parameters appear in the URL, which is logged by web servers, proxies, CDNs, and stored in browser history, permanently exposing secrets.
fix         = Change the endpoint to accept POST requests and pass the secret in the encrypted request body.
pattern     = (method_declaration
                (attribute_list
                  (attribute
                    name: (identifier) @_attr
                    (#match? @_attr "^HttpGet")))
                parameters: (parameter_list
                  (parameter
                    name: (identifier) @_param
                    (#match? @_param "(?i)password|passwd|pwd|pass|secret|apikey|api_key|token|credential|key|auth|otp|pin|ssn|cvv"))))
