# Security filters for https://github.com/Uraxii/gdvcsharp
#
# Clone the target repo, then run:
#   uv run codesearch --filter-file demo/gdvcsharp-security.ini /path/to/gdvcsharp/app/
#
# Each match is labelled with the query name so you can triage by vulnerability class.

# ── Hardcoded Secrets ──────────────────────────────────────────────────────

[hardcoded-api-key]
type        = regex
pattern     = const string.*=\s*"sk-
lang        = c_sharp
description = API keys committed to source control are permanently exposed to anyone with repository access, including through git history.
fix         = Load the key from an environment variable or a secrets manager such as Azure Key Vault at runtime; rotate the exposed key immediately.

[hardcoded-aws-key]
type        = regex
pattern     = const string.*=\s*"AKIA
lang        = c_sharp
description = AWS Access Key IDs in source code grant cloud access to anyone who reads the repository, including through git history.
fix         = Use IAM roles or instance profiles instead of static keys; rotate the exposed key immediately.

[hardcoded-password-constant]
type        = regex
pattern     = const string.*(PASSWORD|PASS|PWD)\s*=\s*"
lang        = c_sharp
description = Passwords in source code are permanently readable by anyone with repository access and cannot be rotated without a code change.
fix         = Load passwords from environment variables or a secrets manager; never store credentials in code.

[hardcoded-secret-constant]
type        = regex
pattern     = const string.*(SECRET|KEY|TOKEN)\s*=\s*"
lang        = c_sharp
description = Secrets embedded in code are visible in git history and to all contributors; a single leak exposes every environment sharing the secret.
fix         = Load secrets from environment variables or a dedicated secrets manager and remove the constant from source.

[hardcoded-key-in-getbytes]
type        = regex
pattern     = GetBytes\("[^"]{6,}"
lang        = c_sharp
description = A symmetric key or JWT secret hardcoded as a string literal can be extracted by anyone who can read the source or decompile the binary.
fix         = Load the key from secure configuration or a key management service; rotate the exposed key immediately.

# ── Authorization Bypass ───────────────────────────────────────────────────

[auth-bypass-via-header]
type        = regex
pattern     = Request\.Headers\[
lang        = c_sharp
description = HTTP headers are fully controlled by the client and must never be used for authorization decisions without cryptographic verification.
fix         = Base authorization on verified server-side session state or cryptographically signed tokens, not on client-supplied header values.

[auth-bypass-via-cookie]
type        = regex
pattern     = Request\.Cookies\[
lang        = c_sharp
description = Cookies are client-controlled and can be forged; using them directly for authorization without signature verification allows privilege escalation.
fix         = Validate cookie values using server-side session state or signed/encrypted tokens; do not trust raw cookie values for access control decisions.

[role-as-method-parameter]
type        = query
pattern     = parameter where name = "role"
lang        = c_sharp
description = Accepting a role as a plain method parameter allows callers to supply any value, bypassing intended access control.
fix         = Derive the user's role from a verified server-side identity (e.g. claims principal) rather than from caller-supplied input.

[admin-action-over-get]
type        = regex
pattern     = \[HttpGet.*admin
lang        = c_sharp
description = Privileged or destructive operations reachable via HTTP GET can be triggered by malicious links, CSRF attacks, or automated crawlers.
fix         = Restrict admin actions to POST, PUT, or DELETE and protect them with anti-CSRF tokens and authorization checks.

# ── Sensitive Data in Request Parameters / Logs ────────────────────────────

[credential-in-log]
type        = regex
pattern     = Log(Information|Warning|Error|Critical).*[Pp]assword|Log(Information|Warning|Error|Critical).*[Aa]pi[Kk]ey
lang        = c_sharp
description = Logging passwords or API keys writes them to log files and monitoring systems where they may be retained indefinitely.
fix         = Never log credential values; log only non-sensitive identifiers or redact sensitive fields before passing them to the logger.

[password-as-method-parameter]
type        = query
pattern     = parameter where name = "password"
lang        = c_sharp
description = Methods accepting a password parameter may log, serialize, or propagate the value to contexts where it becomes exposed.
fix         = Ensure passwords are never logged, serialized into responses, or passed beyond the authentication layer.

[secret-as-method-parameter]
type        = query
pattern     = parameter where name contains "secret"
lang        = c_sharp
description = Methods accepting secrets by name may inadvertently expose them through logging, serialization, or error messages.
fix         = Ensure secret values are never logged or returned in responses; restrict their scope and lifetime.

[apikey-as-method-parameter]
type        = query
pattern     = parameter where name contains "apiKey"
lang        = c_sharp
description = API keys passed as plain parameters risk being logged or serialized into error responses where they become visible.
fix         = Pass API keys through secure headers or configuration objects scoped to the HTTP client; ensure they are never logged.

# ── Cross-Site Scripting (XSS) ─────────────────────────────────────────────

[xss-html-content-type]
type        = string
pattern     = "text/html"
lang        = c_sharp
description = Returning raw HTML with user-controlled content allows attackers to inject scripts that execute in the victim's browser.
fix         = Use a templating engine with automatic HTML encoding, or ensure all user-supplied values are HTML-escaped before rendering.

[xss-innerhtml-assignment]
type        = string
pattern     = innerHTML
lang        = c_sharp
description = Assigning to innerHTML without sanitization executes any script tags or event handlers contained in the supplied string.
fix         = Use textContent or innerText for plain text; sanitize HTML with a trusted library (e.g. DOMPurify) if markup is required.

# ── Server-Side Request Forgery (SSRF) ────────────────────────────────────

[ssrf-http-get]
type        = query
pattern     = call where name = "GetStringAsync"
lang        = c_sharp
description = HttpClient.GetStringAsync with a user-supplied URL can reach internal services, cloud metadata endpoints, and private network hosts.
fix         = Validate the target URL against an allowlist of permitted hosts and schemes; block private IP ranges and loopback addresses.

[ssrf-http-post]
type        = query
pattern     = call where name = "PostAsync"
lang        = c_sharp
description = HttpClient.PostAsync with a user-supplied URL can be redirected to probe or interact with internal infrastructure.
fix         = Validate the target URL against an allowlist of permitted hosts; reject private IP ranges and loopback addresses.

[ssrf-webclient-download]
type        = query
pattern     = call where name = "DownloadString"
lang        = c_sharp
description = WebClient.DownloadString with a user-supplied URL can probe internal services and exfiltrate data to attacker-controlled servers.
fix         = Validate URLs against an allowlist; prefer HttpClient over the deprecated WebClient and block non-permitted destinations.

# ── Path Traversal ─────────────────────────────────────────────────────────

[path-traversal-combine]
type        = query
pattern     = call where name = "Combine"
lang        = c_sharp
description = Path.Combine with user-supplied segments can produce a path outside the intended base directory, allowing reads or writes anywhere on the filesystem.
fix         = After combining, call Path.GetFullPath and assert the result starts with the expected base directory; reject paths that escape it.

[path-traversal-readalltext]
type        = query
pattern     = call where name = "ReadAllText"
lang        = c_sharp
description = File.ReadAllText with a user-controlled path can read arbitrary files, including configuration files containing secrets.
fix         = Canonicalize the path and verify it falls within the permitted base directory before performing any file operation.

[path-traversal-getfiles]
type        = query
pattern     = call where name = "GetFiles"
lang        = c_sharp
description = Directory.GetFiles with a user-supplied directory argument can enumerate files outside the intended scope.
fix         = Validate and canonicalize the directory argument; ensure it falls within an explicitly permitted base path.

[path-traversal-getdirectories]
type        = query
pattern     = call where name = "GetDirectories"
lang        = c_sharp
description = Directory.GetDirectories with a user-supplied argument can enumerate arbitrary directories on the host.
fix         = Validate and canonicalize the argument; restrict traversal to a specific permitted base directory.

# ── Regular Expression Issues (ReDoS / Regex Injection) ────────────────────

[regex-constructor-call]
type        = query
pattern     = identifier where text = "Regex"
lang        = c_sharp
description = Dynamic use of the Regex class with user-supplied patterns can cause catastrophic backtracking (ReDoS) or match unintended input.
fix         = If the pattern is user-supplied, validate it against an allowlist or enforce a timeout via the Regex constructor's matchTimeout parameter.

[redos-nested-quantifier]
type        = regex
pattern     = \+\)\+|\*\)\+|\+\)\*
lang        = c_sharp
description = Nested quantifiers such as (a+)+ cause exponential backtracking on non-matching input, allowing a crafted string to hang the process.
fix         = Rewrite the pattern to avoid nested quantifiers; use atomic groups or possessive quantifiers if the regex engine supports them.

[regex-no-timeout]
type        = regex
pattern     = new Regex\(
lang        = c_sharp
description = Regex without a timeout can block a thread indefinitely if given pathological input, causing a denial of service.
fix         = Pass a TimeSpan timeout as the third argument to the Regex constructor and catch RegexMatchTimeoutException.

# ── Weak JWT Configuration ─────────────────────────────────────────────────

[weak-jwt-issuer-not-validated]
type        = regex
pattern     = ValidateIssuer\s*=\s*false
lang        = c_sharp
description = Disabling issuer validation allows a JWT issued by any party to be accepted, enabling token forgery from a different service.
fix         = Set ValidateIssuer = true and specify the expected issuer in ValidIssuer.

[weak-jwt-audience-not-validated]
type        = regex
pattern     = ValidateAudience\s*=\s*false
lang        = c_sharp
description = Disabling audience validation allows tokens intended for other services to be replayed against this one.
fix         = Set ValidateAudience = true and specify the expected audience in ValidAudiences.

[weak-jwt-lifetime-not-validated]
type        = regex
pattern     = ValidateLifetime\s*=\s*false
lang        = c_sharp
description = Disabling lifetime validation allows expired tokens to authenticate indefinitely, making token revocation and rotation ineffective.
fix         = Set ValidateLifetime = true and use short token expiry times with refresh tokens for long-lived sessions.

# ── Permissive CORS ────────────────────────────────────────────────────────

[cors-allow-any-origin]
type        = query
pattern     = call where name = "AllowAnyOrigin"
lang        = c_sharp
description = AllowAnyOrigin removes same-origin protection entirely, allowing any website to make credentialed cross-origin requests to this API.
fix         = Restrict CORS to an explicit allowlist of trusted origins with WithOrigins; never combine AllowAnyOrigin with AllowCredentials.

[cors-allow-any-method]
type        = query
pattern     = call where name = "AllowAnyMethod"
lang        = c_sharp
description = AllowAnyMethod permits cross-origin DELETE, PUT, and PATCH requests, broadening the attack surface beyond what most APIs require.
fix         = Restrict to specific HTTP methods with WithMethods, allowing only the verbs the API actually exposes to cross-origin callers.

[cors-allow-any-header]
type        = query
pattern     = call where name = "AllowAnyHeader"
lang        = c_sharp
description = AllowAnyHeader allows cross-origin requests to include arbitrary headers, which may bypass security controls that rely on specific header values.
fix         = Restrict to explicitly required headers with WithHeaders.

# ── Exposed API Documentation ──────────────────────────────────────────────

[exposed-swagger-endpoint]
type        = query
pattern     = call where name = "UseSwagger"
lang        = c_sharp
description = A publicly accessible Swagger JSON endpoint exposes the full API surface, parameter schemas, and authentication requirements to unauthenticated users.
fix         = Restrict Swagger to non-production environments or protect it behind authentication middleware.

[exposed-swagger-ui]
type        = query
pattern     = call where name = "UseSwaggerUI"
lang        = c_sharp
description = Publicly accessible Swagger UI allows unauthenticated interactive testing of all API endpoints, facilitating reconnaissance.
fix         = Disable Swagger UI in production or protect it with authentication; consider IP restriction for internal tools.
