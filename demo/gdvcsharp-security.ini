# Security filters for https://github.com/Uraxii/gdvcsharp
#
# Clone the target repo, then run:
#   uv run codesearch --filter-file demo/gdvcsharp-security.ini /path/to/gdvcsharp/app/
#
# Each match is labelled with the query name so you can triage by vulnerability class.

# ── Hardcoded Secrets ──────────────────────────────────────────────────────

[hardcoded-api-key]
# Catches const string declarations whose value starts with "sk-" (OpenAI / Stripe style)
type    = regex
pattern = const string.*=\s*"sk-
lang    = c_sharp

[hardcoded-aws-key]
# AWS Access Key IDs always start with "AKIA"
type    = regex
pattern = const string.*=\s*"AKIA
lang    = c_sharp

[hardcoded-password-constant]
# const/private fields whose name contains PASSWORD, PASS, or PWD
type    = regex
pattern = const string.*(PASSWORD|PASS|PWD)\s*=\s*"
lang    = c_sharp

[hardcoded-secret-constant]
# const/private fields whose name contains SECRET, KEY, or TOKEN
type    = regex
pattern = const string.*(SECRET|KEY|TOKEN)\s*=\s*"
lang    = c_sharp

[hardcoded-key-in-getbytes]
# JWT / symmetric-crypto secrets hardcoded as string literals in GetBytes()
type    = regex
pattern = GetBytes\("[^"]{6,}"
lang    = c_sharp

# ── Authorization Bypass ───────────────────────────────────────────────────

[auth-bypass-via-header]
# Client-controlled HTTP headers used for authorization decisions
type    = regex
pattern = Request\.Headers\[
lang    = c_sharp

[auth-bypass-via-cookie]
# Client-controlled cookies used for authorization decisions
type    = regex
pattern = Request\.Cookies\[
lang    = c_sharp

[role-as-method-parameter]
# Methods that accept a "role" parameter — caller can supply any value
type    = query
pattern = parameter where name = "role"
lang    = c_sharp

[admin-action-over-get]
# Destructive or privileged routes reachable via HTTP GET
type    = regex
pattern = \[HttpGet.*admin
lang    = c_sharp

# ── Sensitive Data in Request Parameters / Logs ────────────────────────────

[credential-in-log]
# Passwords or API keys interpolated directly into log statements
type    = regex
pattern = Log(Information|Warning|Error|Critical).*[Pp]assword|Log(Information|Warning|Error|Critical).*[Aa]pi[Kk]ey
lang    = c_sharp

[password-as-method-parameter]
# Methods that accept a parameter named "password" — check HTTP verb and usage
type    = query
pattern = parameter where name = "password"
lang    = c_sharp

[secret-as-method-parameter]
# Methods that accept a parameter named "secret" or "apiKey"
type    = query
pattern = parameter where name contains "secret"
lang    = c_sharp

[apikey-as-method-parameter]
type    = query
pattern = parameter where name contains "apiKey"
lang    = c_sharp

# ── Cross-Site Scripting (XSS) ─────────────────────────────────────────────

[xss-html-content-type]
# Controller actions returning raw HTML — interpolated user input causes XSS
type    = string
pattern = "text/html"
lang    = c_sharp

[xss-innerhtml-assignment]
# Client-side innerHTML writes that may reflect server-sourced data
type    = string
pattern = innerHTML
lang    = c_sharp

# ── Server-Side Request Forgery (SSRF) ────────────────────────────────────

[ssrf-http-get]
# HttpClient.GetStringAsync called with a potentially user-supplied URL
type    = query
pattern = call where name = "GetStringAsync"
lang    = c_sharp

[ssrf-http-post]
# HttpClient.PostAsync called with a potentially user-supplied URL
type    = query
pattern = call where name = "PostAsync"
lang    = c_sharp

[ssrf-webclient-download]
# Older WebClient.DownloadString — same SSRF risk
type    = query
pattern = call where name = "DownloadString"
lang    = c_sharp

# ── Path Traversal ─────────────────────────────────────────────────────────

[path-traversal-combine]
# Path.Combine with user-supplied segments can escape the base directory
type    = query
pattern = call where name = "Combine"
lang    = c_sharp

[path-traversal-readalltext]
# File.ReadAllText with a user-controlled path
type    = query
pattern = call where name = "ReadAllText"
lang    = c_sharp

[path-traversal-getfiles]
# Directory.GetFiles with a user-controlled directory argument
type    = query
pattern = call where name = "GetFiles"
lang    = c_sharp

[path-traversal-getdirectories]
# Directory.GetDirectories with a user-controlled argument
type    = query
pattern = call where name = "GetDirectories"
lang    = c_sharp

# ── Regular Expression Issues (ReDoS / Regex Injection) ────────────────────

[regex-constructor-call]
# Any use of the Regex class — review for user-supplied patterns or missing timeouts
type    = query
pattern = identifier where text = "Regex"
lang    = c_sharp

[redos-nested-quantifier]
# Regex string literals containing nested quantifiers, e.g. (a+)+ or (.+)*
type    = regex
pattern = \+\)\+|\*\)\+|\+\)\*
lang    = c_sharp

[regex-no-timeout]
# new Regex(...) without a TimeSpan timeout argument is vulnerable to ReDoS
type    = regex
pattern = new Regex\(
lang    = c_sharp

# ── Weak JWT Configuration ─────────────────────────────────────────────────

[weak-jwt-issuer-not-validated]
# Disabling issuer validation allows tokens from any issuer
type    = regex
pattern = ValidateIssuer\s*=\s*false
lang    = c_sharp

[weak-jwt-audience-not-validated]
# Disabling audience validation allows tokens intended for other services
type    = regex
pattern = ValidateAudience\s*=\s*false
lang    = c_sharp

[weak-jwt-lifetime-not-validated]
# Disabling lifetime validation allows expired tokens to be accepted
type    = regex
pattern = ValidateLifetime\s*=\s*false
lang    = c_sharp

# ── Permissive CORS ────────────────────────────────────────────────────────

[cors-allow-any-origin]
# Allows requests from any origin — disables same-origin protection
type    = query
pattern = call where name = "AllowAnyOrigin"
lang    = c_sharp

[cors-allow-any-method]
# Allows all HTTP methods including DELETE and PUT from cross-origin callers
type    = query
pattern = call where name = "AllowAnyMethod"
lang    = c_sharp

[cors-allow-any-header]
# Allows arbitrary request headers from cross-origin callers
type    = query
pattern = call where name = "AllowAnyHeader"
lang    = c_sharp

# ── Exposed API Documentation ──────────────────────────────────────────────

[exposed-swagger-endpoint]
# Swagger JSON endpoint publicly accessible — exposes full API surface
type    = query
pattern = call where name = "UseSwagger"
lang    = c_sharp

[exposed-swagger-ui]
# Swagger UI publicly accessible — allows unauthenticated interactive testing
type    = query
pattern = call where name = "UseSwaggerUI"
lang    = c_sharp
