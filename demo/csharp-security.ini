# Security code-smell queries for C# projects.
# Run with: uv run codesearch --filter-file demo/csharp-security.ini demo/csharp/

[sql-injection]
type        = regex
pattern     = "SELECT |INSERT INTO|UPDATE |DELETE FROM
description = SQL queries built by string concatenation allow attackers to alter the query structure and access or modify arbitrary data.
fix         = Use parameterized queries (SqlCommand with Parameters) or an ORM like Entity Framework instead of string-built SQL.

[hardcoded-secrets]
type        = regex
pattern     = const string.*=\s*"[A-Za-z0-9!@#$%^&*_\-]{8,}"
description = Secrets embedded in source code are permanently exposed to everyone with repository access, including through git history.
fix         = Load secrets from environment variables, app configuration, or a secrets manager such as Azure Key Vault at runtime.

[hardcoded-readonly-secret]
type        = regex
lang        = c_sharp
pattern     = (?i)static\s+readonly\s+string\s+\w*(secret|token|key|password|credential|jwt)\w*\s*=\s*"
description = Secrets assigned to static readonly fields are compiled into the assembly and exposed to anyone who decompiles the binary.
fix         = Load secrets from environment variables, app configuration, or a secrets manager such as Azure Key Vault at runtime.

[weak-hash-md5]
type        = query
pattern     = identifier where text = "MD5"
description = MD5 is cryptographically broken; practical collision attacks exist and it must not be used for security-sensitive hashing.
fix         = Replace with SHA-256 or SHA-512 via System.Security.Cryptography.SHA256.

[weak-hash-sha1]
type        = query
pattern     = identifier where text = "SHA1"
description = SHA-1 is deprecated for security use; collision attacks are well-documented and the algorithm is no longer considered safe.
fix         = Replace with SHA-256 or stronger.

[broken-cipher-des]
type        = query
pattern     = identifier where text = "DES"
description = DES uses a 56-bit key that can be brute-forced in hours with commodity hardware.
fix         = Replace with AES-256 in CBC or GCM mode.

[broken-cipher-rc2]
type        = query
pattern     = identifier where text = "RC2"
description = RC2 is an obsolete cipher with known weaknesses and an effective key size that can be attacked.
fix         = Replace with AES-256 in GCM or CBC mode with a random IV.

[insecure-random]
type        = query
pattern     = identifier where text = "Random"
lang        = c_sharp
description = System.Random uses a predictable seed and is not suitable for security-sensitive values such as tokens or nonces.
fix         = Use System.Security.Cryptography.RandomNumberGenerator to generate cryptographically secure random values.

[disabled-ssl]
type        = regex
pattern     = ServerCertificateValidationCallback
description = Overriding ServerCertificateValidationCallback to return true disables TLS certificate validation, exposing connections to man-in-the-middle attacks.
fix         = Remove the callback override and rely on default runtime validation, or pin the expected certificate explicitly.

[unsafe-deserialisation]
type        = query
pattern     = identifier where text = "BinaryFormatter"
description = BinaryFormatter deserializes arbitrary .NET types from the payload, enabling remote code execution when input is untrusted.
fix         = Replace with System.Text.Json or Newtonsoft.Json with TypeNameHandling.None; never deserialize untrusted data with BinaryFormatter.

[unsafe-json-type-handling]
type        = query
pattern     = identifier where text = "TypeNameHandling"
description = TypeNameHandling.All or TypeNameHandling.Objects allows the JSON payload to specify any .NET type to instantiate, enabling remote code execution.
fix         = Set TypeNameHandling to None and use explicit, strongly-typed model classes.

[command-injection]
type        = query
pattern     = call where name = "Start"
lang        = c_sharp
description = Process.Start with user-controlled arguments can execute arbitrary OS commands on the host system.
fix         = Avoid spawning processes with user-supplied input; use safe library APIs for the required functionality and validate input strictly if spawning is unavoidable.

[path-traversal]
type        = query
pattern     = call where name = "ReadAllText"
lang        = c_sharp
description = File.ReadAllText with a user-supplied path can escape the intended directory and read arbitrary files on the host.
fix         = Canonicalize the path with Path.GetFullPath, verify it starts with the expected base directory, and reject any path that escapes it.

[ssrf]
type        = query
pattern     = call where name = "DownloadString"
lang        = c_sharp
description = WebClient.DownloadString with a user-supplied URL can probe internal services, cloud metadata endpoints, or exfiltrate data to attacker-controlled servers.
fix         = Validate the target URL against an allowlist of permitted hosts and schemes before making the request.
